<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm Not a Robot</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f2f2f2;
      padding: 20px;
    }

    h3 {
      margin-bottom: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      gap: 15px;
      justify-content: center;
      margin-bottom: 20px;
    }

    img {
      width: 120px;
      height: 120px;
      border: 4px solid transparent;
      cursor: pointer;
      border-radius: 10px;
    }

    .selected {
      border: 4px solid blue;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #reset,
    #verify {
      display: none;
    }

    #para {
      font-size: 18px;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <h3 id="h">
    Please click on the identical tiles to verify that you are not a robot.
  </h3>

  <div class="container" id="image-container"></div>

  <button id="reset">Reset</button>
  <button id="verify">Verify</button>

  <p id="para"></p>

  <script>
    const images = [
      "https://picsum.photos/id/101/200",
      "https://picsum.photos/id/102/200",
      "https://picsum.photos/id/103/200",
      "https://picsum.photos/id/104/200",
      "https://picsum.photos/id/105/200"
    ];

    const container = document.getElementById("image-container");
    const resetBtn = document.getElementById("reset");
    const verifyBtn = document.getElementById("verify");
    const para = document.getElementById("para");

    let selectedImages = [];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function loadImages() {
      container.innerHTML = "";

      // Pick random image to duplicate
      const duplicateIndex = Math.floor(Math.random() * images.length);

      let imageSet = [...images, images[duplicateIndex]];

      shuffle(imageSet);

      imageSet.forEach((src, index) => {
        const img = document.createElement("img");

        img.src = src;
        img.dataset.value = src;
        img.classList.add("tile");

        img.addEventListener("click", () => selectImage(img));

        container.appendChild(img);
      });
    }

    function selectImage(img) {

      if (
        selectedImages.length >= 2 ||
        selectedImages.includes(img)
      ) {
        return;
      }

      img.classList.add("selected");
      selectedImages.push(img);

      resetBtn.style.display = "inline-block";

      if (selectedImages.length === 2) {
        verifyBtn.style.display = "inline-block";
      }
    }

    resetBtn.addEventListener("click", () => {

      selectedImages.forEach(img => {
        img.classList.remove("selected");
      });

      selectedImages = [];

      resetBtn.style.display = "none";
      verifyBtn.style.display = "none";

      para.textContent = "";
    });

    verifyBtn.addEventListener("click", () => {

      const first = selectedImages[0].dataset.value;
      const second = selectedImages[1].dataset.value;

      if (first === second) {
        para.textContent =
          "You are a human. Congratulations!";
      } else {
        para.textContent =
          "We can't verify you as a human. You selected the non-identical tiles.";
      }

      verifyBtn.style.display = "none";
    });

    loadImages();
  </script>

</body>
</html>
