<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm not a robot</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    .images {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    img {
      width: 120px;
      height: 120px;
      cursor: pointer;
      border: 4px solid transparent;
    }

    .selected {
      border: 4px solid blue;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }

    #reset,
    #verify {
      display: none;
    }
  </style>
</head>

<body>

  <h3 id="h">
    Please click on the identical tiles to verify that you are not a robot.
  </h3>

  <div class="images" id="container"></div>

  <button id="reset">Reset</button>
  <button id="verify">Verify</button>

  <p id="para"></p>

  <script>
    const imageClass = [
      "img1",
      "img2",
      "img3",
      "img4",
      "img5"
    ];

    const container = document.getElementById("container");
    const resetBtn = document.getElementById("reset");
    const verifyBtn = document.getElementById("verify");
    const para = document.getElementById("para");

    let selectedTiles = [];

    // duplicate random image
    const duplicate =
      imageClass[Math.floor(Math.random() * imageClass.length)];

    let allImages = [...imageClass, duplicate];

    // shuffle images
    allImages.sort(() => Math.random() - 0.5);

    // render images
    allImages.forEach((cls, index) => {
      const img = document.createElement("img");

      img.src = `https://picsum.photos/200?random=${index + 1}`;

      img.classList.add(cls);

      img.addEventListener("click", function () {

        if (
          selectedTiles.length < 2 &&
          !selectedTiles.includes(this)
        ) {

          this.classList.add("selected");
          selectedTiles.push(this);

          resetBtn.style.display = "inline-block";

          if (selectedTiles.length === 2) {
            verifyBtn.style.display = "inline-block";
          }
        }
      });

      container.appendChild(img);
    });

    // reset functionality
    resetBtn.addEventListener("click", function () {

      selectedTiles.forEach(tile => {
        tile.classList.remove("selected");
      });

      selectedTiles = [];

      para.textContent = "";

      resetBtn.style.display = "none";
      verifyBtn.style.display = "none";
    });

    // verify functionality
    verifyBtn.addEventListener("click", function () {

      const firstClass =
        [...selectedTiles[0].classList].find(c => c.startsWith("img"));

      const secondClass =
        [...selectedTiles[1].classList].find(c => c.startsWith("img"));

      if (firstClass === secondClass) {
        para.textContent =
          "You are a human. Congratulations!";
      } else {
        para.textContent =
          "We can't verify you as a human. You selected the non-identical tiles.";
      }

      verifyBtn.style.display = "none";
    });
  </script>

</body>
</html>
